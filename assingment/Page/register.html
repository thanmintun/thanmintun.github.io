        <h1 align="center">အမည်စရင်းပေးသွင်းရန်</h1>

        <label for="Name"><b>အမည်</b></label>
        <input type="text" name="Name" id="Name" placeholder="ကို/မ.......">

        <input type="radio" name="Gender" id="Female" value="Female">

    </form>
