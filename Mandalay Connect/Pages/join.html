<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Now</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <!-- start nav -->

    <nav class="nav">
        <div class="logo"><img src="../img/logo (2).png" alt="" class="logoimg"><span>MandalayConnect</span></div>
        <ul class="ul">
            <li class="li"><a href="../index.html">Home</a></li>
            <li class="li"><a href="#">Discover</a></li>
            <li class="li"><a href="#">Profile</a></li>
            <li class="li"><a href="#">About Us</a></li>
        </ul>
    </nav>

    <!-- end nav -->
    <!-- start sign up  -->
    <header>
        <div class="sg_content">
            <div class="sg_card">
                <div class="signuppage">
                    <h1 class="title">Sign Up</h1>
                    <form action="#" method="get">
                        <label for="Name" class="fname">First Name</label>
                        <input type="text" name="Name" required id="namebox"><br>
                        <label for="sName" class="sname">Secound Name</label>
                        <input type="text" name="sName" id="sname" required><br>
                        <label for="age" class="age">Age</label>
                        <input type="number" name="age" id="age" required><br>
                        <label for="sex" class="sex">Sex</label>
                        <select name="sex" id="sex" required>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                        <label for="email" class="email">Email</label>
                        <input type="email" placeholder="username@email.com" id="email"><br>
                        <label for="password" class="password"  >Password</label>
                        <input type="password" required name="password" id="password"><br>
                        <label for="confirm password" class="confirmpassword" >Confirm Password</label>
                        <input type="password" id="confrim"><br>
                        <button type="submit" class="signupbutton">Sign Up</button>

                    </form>
                </div>
            </div>
        </div>
    </header>
    <!-- end sign up -->

    <!-- start footer -->

    <footer class="footerall">
        <div class="footerbackground">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>Mandalay Connect</h3>
                    <p>မန္တလေးမြို့၏ အကောင်းဆုံး Dating Community ဖြစ်ပါသည်။</p>
                </div>
                <div class="footer-sectionQ">
                    <h4>Quick Links</h4>
                    <ul class="ulq">
                        <li class="liq"><a href="#">About Us</a></li>
                        <li class="liq"><a href="#">Discover</a></li>
                        <li class="liq"><a href="#">Profile</a></li>
                    </ul>
                </div>
                <div class="footer-sectionA">
                    <h4>Follow Us</h4>
                    <p class="address">Facebook </p>
                    <p class="address">Instagram</p>
                    <p class="address">Twitter</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Mandalay Connect. All rights reserved.</p>
            </div>
        </div>
    </footer>
    <!-- end footer -->
</body>
