<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Data Type</h1>
    <script>
        // staing data type 
        // let name = "thanmintun"
        // let name = "thanmintun"
        let name = `thanmintun`;

        console.log(name);
        console.log(typeof(name));


        // numberic data type
        let age=24
        console.log(age);
        console.log(typeof(age))

//  bollen data type (true or false)
let isstudent = true
console.log(isstudent);
        console.log(typeof(isstudent))


        // underfined data type
        let underfinedVariable;
        console.log(underfinedVariable);
        console.log(typeof(underfinedVariable))


        // null data 
        let nullVariable=null;
        console.log(nullVariable);
        console.log(typeof(nullVariable))

        // array data type index star form 0
        // let studentlist =new array(`aunf aung` , `hla hla`);
        let studentlist = [ `mg mg` , `aung aung`, `hla hla`];
        console.log(studentlist);
        console.log(typeof(studentlist))
        console.log(studentlist.length)
        console.log(studentlist[2]);


        // object data type
        let student = {
            //key:value
            name : "thanmintun",
            age : 29,
            education : "ITC no(2) MDY"

        }
        console.log(student)
        console.log(typeof(student))
        console.log(student.education)
        


    </script>
</body>
</html>
