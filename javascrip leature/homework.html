<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>အလီ</title>
</head>
<body>
    <h1>အလီ</h1>
    <script>
    
let userInput = prompt("အလီနံပါတ်ကို ထည့်ပါ");
let number = Number(userInput);

// document.write("<h3>" + number + " အတွက် အလီဇယား</h3>");
document.write(`<h3> ${number} အလီ</h3>`);

for (let i = 1; i <= 12; i++){
    document.write(`${(0+i)} x ${number}=${(number*i)} <br>`)}
        
        </script>
</body>
</html>
