<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Looping</h1>
    <script>
        //for loop
        // for(initialize;condition;increment)
        //code
        //  }
        for( let i=0; i < 5  ;i++ ){
            document.write("<h3>Hello World</h3>");
        }
        let laptoplist=["Apple","Samsung","Lenovo","HP","Dell"];
        // document.write(my laptop is ${laptoplist[0]}<br/>);

        for(let i=0; i < laptoplist.length; i++){
            document.write(`<h3>
                ${i+1}. My laptop is ${laptoplist[i]} </h3>`
            );
        }

            </script>

</body>
</html>
