<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Looping</h1>
    <script>
        //for loop
        // for(initialize;condition;increment)
        //code
        //  }
        for( let i=0; i < 5  ;i++ ){
            document.write("<h3>Hello World</h3>");
        }
        let laptoplist=["Apple","Samsung","Lenovo","HP","Dell"];
        // document.write(my laptop is ${laptoplist[0]}<br/>);

        for(let i=0; i < laptoplist.length; i++){
            document.write(`<h3>
                ${i+1}. My laptop is ${laptoplist[i]} </h3>`
            );
        }

        // for(let i=0; i<3; i++){
        //     for(let j=0; j<=i; j++){
        //         document.write(`*`);
                
        //     }
        //     document.write(`<br>`)
        // }
        
         for(let i=0; i<5; i++){
            for(let j=0; j<=i; j++){
                document.write(`*`);
                
            }
            document.write(`<br>`)
        }

        //while loop
        let number= parseInt(prompt("Enter a number"));
        // while(condition){    
            // code
            // }
            // 100 < 100
            while(number < 100){document.write(`Your Number is While loop ${number}<br>`);
                number+=10;
            }
            //do while loop
            //do{
            // code
            // update 
            // }while(condition)
            do{
                document.write(`Your Number is Do while loop ${number}<br>`);
                number+=20;
            } while(number < 100);



            </script>

</body>
</html>
