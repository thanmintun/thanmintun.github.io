<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Register</h1>
    <form action="" name="myForm">
        <label for="name">Name</label>
        <input type="text" name="name" id="name"><br><br>
        <label for="age">Age</label><br>
        <input type="number" id="age" name="age"><br><br>
        <label for="address" >Address </label>
        <textarea name="address" id="address"> </textarea><br><br>
<button type="button" onclick="showData()"> Regester</button>
    </form>
<h1>Student List</h1>
<table cellspacing="0" cellpadding="20" border="1">
    <thead>
        <tr>
            <th>NO.</th>
            <th>Name</th>
            <th>Age</th>
            <th>Address</th>
        </tr>
    </thead>
    <tbody id="myTbody">

    </tbody>
</table>

<script>
// get data

let studentList = []
function showData(){
//get input value
//let name = document.getElementById("name").value;
let name=document.myForm.name.value;
let age=document.myForm.age.value;
let address=document.myForm.address.value;



//create object
let student = {
    studentName : name,
    studentAge : age,
    studentAddress : address
}
// push object to array
studentList.push(student);
studentListToTable();

}
function studentListToTable(){
    let html='';

    for (let i=0;i<studentList.length;i++){
        html+= `<tr>
                    <td>${i+1}</td>
                    <td>${studentList[i].studentName}</td>
                    <td>${studentList[i].studentAge}</td>
                    <td>${studentList[i].studentAddress}</td>
                </tr>`;
    }
    document.getElementById("myTbody").innerHTML=html;
}



</script>

</body>
</html>
